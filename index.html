<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Inventario</title>

<style>

/* GENERAL */
body {
  font-family: 'Segoe UI', Arial;
  background: #f4f4f4;
  margin: 0;
}

.app {
  max-width: 420px;
  margin: auto;
  background: white;
  min-height: 100vh;
  padding: 20px;
}

h2 { margin-bottom: 20px; }
.titulo { text-align: center; }

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}

select, input {
  width: 100%;
  height: 40px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTONES */
.btn {
  width: 100%;
  background: #2f6edb;
  color: white;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
}

/* CARD */
.card {
  background: #f8f8f8;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-actions {
  display: flex;
  gap: 10px;
}

.icon-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #eee;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

/* SCREEN */
.screen { display: none; }
.active { display: block; }

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="app">

<!-- PRINCIPAL -->
<div id="screen1" class="screen active">

<h2 class="titulo">INVENTARIO SALAS</h2>

<label>Sitio</label>
<select id="sitio"></select>

<label>Sala</label>
<select id="sala"></select>

<label>Fila</label>
<select id="fila"></select>

<label>Rack</label>
<select id="rack"></select>

<h3>Total: <span id="count">0</span></h3>

<div id="results"></div>

<button class="btn" onclick="goNuevo()">➕ Add Equipment</button>

</div>

<!-- DETALLE -->
<div id="detalle" class="screen">

<div class="header">
  <h2>Detalle</h2>
  <div class="header-actions">
    <button class="btn" onclick="editar()">Editar</button>
    <span class="icon-close" onclick="confirmarVolver()">✕</span>
  </div>
</div>

<div id="detalleContent"></div>

</div>

<!-- NUEVO -->
<div id="nuevo" class="screen">

<div class="header">
  <h2>Nuevo</h2>
  <span class="icon-close" onclick="confirmarVolver()">✕</span>
</div>

<input id="new_producto" placeholder="Producto">
<input id="new_serial" placeholder="Serial">
<input id="new_status" placeholder="Status">

<button class="btn" onclick="guardarNuevo()">Guardar</button>

</div>

<!-- POPUP -->
<div id="popupConfirm" class="popup">
  <div class="popup-content">
    <p>¿Salir?</p>
    <button onclick="aceptarVolver()">Si</button>
    <button onclick="cerrarPopup()">No</button>
  </div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
